syntax = "proto3";

package executor.knita.io;

option go_package = "github.com/knita-io/knita/api/executor/v1";

import "events/v1/event.proto";
import "google/protobuf/duration.proto";

service Executor {
  rpc Introspect(IntrospectRequest) returns (IntrospectResponse);
  rpc Events(EventsRequest) returns (stream events.knita.io.Event);
  rpc Open(OpenRequest) returns (OpenResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc Exec(ExecRequest) returns (ExecResponse);
  rpc Import(stream FileTransfer) returns (ImportResponse);
  rpc Export(ExportRequest) returns (stream FileTransfer);
  rpc Close(CloseRequest) returns (CloseResponse);
}

message ExecutorInfo {
  string name = 1;
}

message SystemInfo  {
  string os = 2;
  string arch = 3;
  uint32 total_cpu_cores = 4;
  uint64 total_memory = 5;
}

message IntrospectRequest {}
message IntrospectResponse{
  SystemInfo sys_info = 1;
  ExecutorInfo executor_info = 3;
  map<string, string> labels = 2;
}

message EventsRequest {
  string build_id = 1;
  string runtime_id = 2;
  string barrier_id = 3;
}

message OpenRequest {
  string build_id = 1;
  string runtime_id = 2;
  RuntimeOpts opts = 3;
}

message OpenResponse {
  string work_directory = 1;
  SystemInfo sys_info = 2;
}

message HeartbeatRequest {
  string runtime_id = 1;
}

message HeartbeatResponse {
  google.protobuf.Duration extended_by = 1;
}

enum RuntimeType {
  RUNTIME_UNSPECIFIED = 0;
  RUNTIME_HOST = 1;
  RUNTIME_DOCKER = 2;
}

// OptsMeta carries identifying (labels) and non-identifying (annotations)
// metadata that travels with an Opts value across the system. Labels are
// intended for selection/filtering; annotations are free-form payload.
message OptsMeta {
  map<string, string> labels = 1;
  map<string, string> annotations = 2;
}

message RuntimeOpts {
  RuntimeType type = 1;
  LabelSelector label_selector = 2;
  oneof opts {
    HostOpts host = 3;
    DockerOpts docker = 4;
  }
  OptsMeta meta = 5;
  string display_name = 7;
}

message HostOpts {}

message DockerOpts {
  DockerPullOpts image = 1;
}

message DockerPullOpts {
  enum PullStrategy {
    PULL_STRATEGY_UNSPECIFIED = 0;
    PULL_STRATEGY_NEVER = 1;
    PULL_STRATEGY_ALWAYS = 2;
    PULL_STRATEGY_NOT_EXISTS = 3;
  }
  string image_uri = 1;
  PullStrategy pull_strategy = 2;
  DockerPullAuth auth = 3;
}

message DockerPullAuth {
  oneof auth {
    BasicAuth basic = 1;
    AWSECRAuth aws_ecr = 2;
  }
}

message BasicAuth {
  string username = 1;
  string password = 2;
}

message AWSECRAuth  {
  string region = 1;
  string aws_access_key_id = 2;
  string aws_secret_key = 3;
}

message ExecRequest {
  string runtime_id = 1;
  string exec_id = 2;
  string barrier_id = 3;
  ExecOpts opts = 4;
}

message ExecOpts {
  string name = 1;
  repeated string args = 2;
  repeated string env = 3;
  OptsMeta meta = 4;
  string display_name = 6;
}

message ExecResponse{
  int32 exit_code = 1;
}

message FileTransfer {
  string runtime_id = 1;
  string transfer_id = 2;
  string file_id = 3;
  FileTransferHeader header = 4;
  FileTransferBody body = 5;
  FileTransferTrailer trailer = 6;
}

message FileTransferHeader {
  bool is_dir = 1;
  string src_path = 2;
  string dest_path = 3;
  uint32 mode = 4;
  uint64 size = 5;
}

message FileTransferBody {
  uint64 offset = 1;
  bytes data = 2;
}

message FileTransferTrailer {
  bytes md5 = 1;
}

message ImportResponse {}

message ExportRequest {
  string runtime_id = 1;
  string export_id = 2;
  string src_path = 3;
  ExportOpts opts = 4;
}

message ExportOpts {
  string dest_path = 1;
  repeated string excludes = 2;
  OptsMeta meta = 3;
}

message CloseRequest {
  string runtime_id = 1;
  string barrier_id = 2;
}

message CloseResponse {}

// LabelSelector defines a query over object labels.
//
// A LabelSelector is comprised of two optional fields, matchLabels and matchExpressions.
// Both fields, when set, must be satisfied (logical AND between them).
message LabelSelector {
  // matchLabels is a set of {key:value} pairs.  An object is selected only if
  // it contains every one of these exact key/value entries in its labels.
  //
  // Example:
  //   matchLabels = { "env":"prod", "tier":"frontend" }
  // means “select objects whose labels include env=prod AND tier=frontend”.
  map<string, string> matchLabels = 1;

  // matchExpressions is a list of more complex requirements.  Each entry is
  // a LabelSelectorRequirement and all requirements are AND’d together.
  //
  // Within each requirement:
  //  - IN    means the label’s value must be one of the listed values.
  //  - NOT_IN means the label’s value must be none of the listed values.
  //  - EXISTS means the object must have the label key present (value ignored).
  //  - DOES_NOT_EXIST means the object must NOT have the label key.
  //
  // Example:
  //   matchExpressions = [
  //     { key: "version",    operator: IN,            values: ["v1","v2"] },
  //     { key: "deprecated", operator: DOES_NOT_EXIST }
  //   ]
  // means “select objects where version is v1 or v2, AND which do NOT have a
  // deprecated label at all.”
  repeated LabelSelectorRequirement matchExpressions = 2;
}

// A single requirement in matchExpressions.
// All requirements in the array must be met (AND), but for IN/NOT_IN
// the list of values is itself an OR group.
message LabelSelectorRequirement {
  // The label key to apply the test against.
  string key = 1;

  // Operator to apply.  Determines how (or whether) values[] is used:
  //
  //  IN            → label[key] must equal one of the values in the list.
  //  NOT_IN        → label[key] must exist and not equal any of the values.
  //  EXISTS        → label[key] must exist; values[] MUST be empty.
  //  DOES_NOT_EXIST→ label[key] must not exist; values[] MUST be empty.
  enum Operator {
    // Unspecified—invalid at runtime.
    OPERATOR_UNSPECIFIED = 0;

    // key’s value ∈ values[]
    IN = 1;

    // key exists AND key’s value ∉ values[]
    NOT_IN = 2;

    // key exists (ignore values[]).
    EXISTS = 3;

    // key does not exist (ignore values[]).
    DOES_NOT_EXIST = 4;
  }
  Operator operator = 2;

  // List of string values.  Required for IN and NOT_IN; must be empty
  // for EXISTS and DOES_NOT_EXIST.
  repeated string values = 3;
}
