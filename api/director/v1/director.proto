syntax = "proto3";

package director.knita.io;

option go_package = "github.com/knita-io/knita/api/director/v1";

import "executor/v1/executor.proto";
import "events/v1/event.proto";

service Director {
  rpc Open(OpenRequest) returns (OpenResponse);
  rpc Exec(ExecRequest) returns (stream events.knita.io.Event);
  rpc Import(ImportRequest) returns (ImportResponse);
  rpc Export(ExportRequest) returns (ExportResponse);
  rpc Close(CloseRequest) returns (CloseResponse);
}

message OpenRequest {
  string build_id = 1;
  executor.knita.io.RuntimeOpts opts = 2;
}

message OpenResponse {
  string runtime_id = 1;
  string work_directory = 2;
  executor.knita.io.SystemInfo sys_info = 3;
}

message ImportRequest {
  string runtime_id = 1;
  ImportOpts opts = 2;
}

message ImportOpts {
  string src_path = 1;
  string dest_path = 2;
  repeated string excludes = 3;
  executor.knita.io.OptsMeta meta = 4;
  string display_name = 6;
}

message ImportResponse {}

message ExportRequest {
  string runtime_id = 1;
  ExportOpts opts = 2;
}

message ExportOpts {
  string src_path = 1;
  string dest_path = 2;
  repeated string excludes = 3;
  executor.knita.io.OptsMeta meta = 4;
  string display_name = 6;
}

message ExportResponse {}

message ExecRequest {
  string runtime_id = 1;
  executor.knita.io.ExecOpts opts = 2;
}

message CloseRequest {
  string runtime_id = 1;
}

message CloseResponse {}
